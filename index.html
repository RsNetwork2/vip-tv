<!DOCTYPE html>
<html>
<head>
    <title>Satkhira Vision Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="margin:0; background:#000;">
    <video id="video" controls autoplay style="width:100%; height:100vh;"></video>
    <script>
        var video = document.getElementById('video');
        // নিচের লাইনে আপনার রিয়েল আইপি বসিয়ে দিন
        var videoSrc = 'http://http://59.152.99.22/:8888/live/channel1/index.m3u8';
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        }
    </script>
</body>
</html>
